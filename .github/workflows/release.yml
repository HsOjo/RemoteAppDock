name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts without creating a GitHub Release'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: amd64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --extra build

      - name: Read version
        id: version
        shell: bash
        run: |
          version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        run: uv run pyinstaller RemoteAppDock.spec --clean --noconfirm

      - name: Package artifact
        id: package
        shell: pwsh
        run: |
          $zipName = "RemoteAppDock-${{ matrix.platform }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path "dist/RemoteAppDock/*" -DestinationPath $zipName -Force
          echo "artifact=$zipName" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RemoteAppDock v${{ steps.version.outputs.version }}
          draft: true
          files: artifacts/**/*
          generate_release_notes: true
